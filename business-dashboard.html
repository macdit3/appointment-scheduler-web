<div x-data="businessesPage">
  <div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Available Businesses</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <template x-for="business in businesses" :key="business.id">
        <div class="border rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow">
          <h2 class="text-xl font-semibold" x-text="business.name"></h2>
          <p class="text-gray-600" x-text="business.address"></p>
          <p class="text-gray-600" x-text="business.phone"></p>
          <a :href="`/booking.html?business=${business.id}`"
             class="block mt-4 text-center bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
            Book Appointment
          </a>
        </div>
      </template>
    </div>

    <div x-show="loading" class="text-center py-4">
      Loading...
    </div>

    <div x-show="error" class="text-center py-4 text-red-500" x-text="error"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('businessesPage', () => ({
      businesses: [],
      loading: true,
      error: null,

      async init() {
        try {
          this.businesses = await getBusinesses();
        } catch (err) {
          this.error = 'Failed to load businesses: ' + err.message;
          console.error(err);
        } finally {
          this.loading = false;
        }
      }
    }));
  });
</script>
